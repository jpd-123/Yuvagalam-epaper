<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>యువగళం - అడ్మిన్ లాగిన్</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 50px 10px;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px 25px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            max-width: 380px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 {
            color: #1a252f;
            margin-bottom: 20px;
            font-size: 22px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        .error {
            color: #d9534f;
            background-color: #fdf7f7;
            border: 1px solid #d9534f;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>యువగళం అడ్మిన్ లాగిన్</h2>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="పాస్‌వర్డ్ ఎంటర్ చేయండి" required>
            <button type="submit">లాగిన్</button>
        </form>
    </div>

</body>
</html>
