<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>యువగళం - ఈ-పేపర్ అప్‌లోడ్</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            background: white;
            margin: 30px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #1a252f;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        .note {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #495057;
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📰 యువగళం ఈ-పేపర్ అప్‌లోడ్</h2>
        <p>మీ సబ్ ఎడిటర్ పంపిన 8 పేజీల PDF గూగుల్ డ్రైవ్ లింక్‌ను ఇక్కడ పేస్ట్ చేయండి.</p>

        <form action="/process-url" method="POST">
            <input type="text" name="drive_url" placeholder="గూగుల్ డ్రైవ్ PDF లింక్ ఇక్కడ పేస్ట్ చేయండి..." required>
            <button type="submit">ఈ-పేపర్ ప్రాసెస్ చేయి & ప్రివ్యూ చూడు 🚀</button>
        </form>

        <div class="note">
            📌 <b>గమనిక:</b> గూగుల్ డ్రైవ్ లింక్ పర్మిషన్ <b>'Anyone with the link'</b> అని ఉండేలా చూసుకోండి.
        </div>
    </div>

</body>
</html>
